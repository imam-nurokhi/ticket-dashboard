<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="Nexora Support — IT Helpdesk Dashboard"/>
  <title>Nexora Support · IT Helpdesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/main.css"/>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="loader-inner">
    <div class="loader-rings">
      <div class="lr lr1"></div>
      <div class="lr lr2"></div>
      <div class="lr lr3"></div>
    </div>
    <div class="loader-logo-wrap">
      <svg class="loader-icon" viewBox="0 0 32 32" fill="none">
        <path d="M16 3L3 9.5l13 6.5 13-6.5L16 3z" stroke="url(#lg1)" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M3 22.5l13 6.5 13-6.5" stroke="url(#lg2)" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M3 16l13 6.5L29 16" stroke="url(#lg3)" stroke-width="1.8" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="lg1" x1="3" y1="3" x2="29" y2="16"><stop stop-color="#00d4aa"/><stop offset="1" stop-color="#4f94f8"/></linearGradient>
          <linearGradient id="lg2" x1="3" y1="22" x2="29" y2="29"><stop stop-color="#4f94f8"/><stop offset="1" stop-color="#a371f7"/></linearGradient>
          <linearGradient id="lg3" x1="3" y1="16" x2="29" y2="22"><stop stop-color="#00d4aa"/><stop offset="1" stop-color="#a371f7"/></linearGradient>
        </defs>
      </svg>
    </div>
    <div class="loader-title">NEXORA <span>SUPPORT</span></div>
    <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
    <div class="loader-text">Loading ticket data…</div>
  </div>
</div>

<!-- SIDEBAR OVERLAY (mobile) -->
<div id="mob-overlay" onclick="toggleSidebar()"></div>

<!-- APP SHELL -->
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-head">
      <svg class="sb-logo" viewBox="0 0 32 32" fill="none">
        <path d="M16 3L3 9.5l13 6.5 13-6.5L16 3z" stroke="url(#slg1)" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M3 22.5l13 6.5 13-6.5" stroke="url(#slg2)" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M3 16l13 6.5L29 16" stroke="url(#slg2)" stroke-width="1.8" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="slg1" x1="3" y1="3" x2="29" y2="16"><stop stop-color="#00d4aa"/><stop offset="1" stop-color="#4f94f8"/></linearGradient>
          <linearGradient id="slg2" x1="3" y1="16" x2="29" y2="29"><stop stop-color="#4f94f8"/><stop offset="1" stop-color="#a371f7"/></linearGradient>
        </defs>
      </svg>
      <div>
        <div class="sb-name">Nexora</div>
        <div class="sb-sub">Support IT</div>
      </div>
      <button class="sb-close" onclick="toggleSidebar()" aria-label="Close">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Donut mini chart -->
    <div class="sb-donut-wrap">
      <svg id="donutChart" viewBox="0 0 80 80" class="donut-svg"></svg>
      <div class="donut-center">
        <div class="donut-pct" id="donutPct">—</div>
        <div class="donut-lbl">resolved</div>
      </div>
    </div>

    <nav class="sb-nav">
      <div class="nav-label">DASHBOARD</div>
      <button class="nav-item active" data-filter="" onclick="navClick(this,'')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        <span>Overview</span>
      </button>
      <div class="nav-label">TICKETS</div>
      <button class="nav-item" data-filter="open" onclick="navClick(this,'open')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        <span>Open</span>
        <span id="nav-open" class="nbadge open">0</span>
      </button>
      <button class="nav-item" data-filter="in_progress" onclick="navClick(this,'in_progress')">
        <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/><circle cx="12" cy="12" r="4"/></svg>
        <span>In Progress</span>
        <span id="nav-progress" class="nbadge progress">0</span>
      </button>
      <button class="nav-item" data-filter="pending" onclick="navClick(this,'pending')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M10 9h4M10 15h4"/></svg>
        <span>Pending</span>
      </button>
      <button class="nav-item" data-filter="closed" onclick="navClick(this,'closed')">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>Closed</span>
      </button>
      <div class="nav-label">SYSTEM</div>
      <button class="nav-item" data-filter="analytics" onclick="navAnalytics(this)">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Analytics</span>
        <span class="nbadge" style="background:rgba(0,212,170,.15);color:var(--teal);font-size:8px">NEW</span>
      </button>
    </nav>

    <div class="sb-footer">
      <span class="pulse-dot"></span>
      <span>Live · <span id="sb-total">—</span> tickets</span>
      <span class="sb-ver">v2.0</span>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-wrap">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="burger" onclick="toggleSidebar()" aria-label="Menu">
        <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h12"/></svg>
      </button>
      <div class="topbar-brand">
        <span class="topbar-title">IT Helpdesk</span>
        <span class="topbar-date" id="topbar-date"></span>
      </div>
      <div class="topbar-center">
        <div class="search-wrap">
          <svg class="search-ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="searchQ" type="search" placeholder="Search tickets, users, IDs… (⌘K)" oninput="doFilter()" autocomplete="off"/>
          <kbd class="search-kbd">⌘K</kbd>
        </div>
      </div>
      <div class="topbar-right">
        <select id="catSel" onchange="doFilter()">
          <option value="">All Categories</option>
        </select>
        <div class="topbar-avatar" title="Dashboard Admin">DA</div>
      </div>
    </header>

    <!-- STATS GRID -->
    <section id="statsGrid" class="stats-grid"></section>

    <!-- CHIP ROW -->
    <div class="chip-row">
      <div class="chips">
        <button class="chip active" data-status="" onclick="setChip(this,'')">
          <span class="chip-dot" style="background:var(--t3)"></span>All
        </button>
        <button class="chip" data-status="open" onclick="setChip(this,'open')">
          <span class="chip-dot" style="background:var(--green)"></span>Open
        </button>
        <button class="chip" data-status="in_progress" onclick="setChip(this,'in_progress')">
          <span class="chip-dot" style="background:var(--amber)"></span>In Progress
        </button>
        <button class="chip" data-status="pending" onclick="setChip(this,'pending')">
          <span class="chip-dot" style="background:var(--violet)"></span>Pending
        </button>
        <button class="chip" data-status="closed" onclick="setChip(this,'closed')">
          <span class="chip-dot" style="background:var(--blue)"></span>Closed
        </button>
      </div>
      <span id="resultCount" class="result-count"></span>
    </div>

    <!-- CONTENT BODY -->
    <div id="overviewContent">
      <div class="content-body">
        <section class="ticket-section">
          <div id="ticketList" class="ticket-list"></div>
          <div id="pager" class="pager"></div>
        </section>
        <aside id="rightPanel" class="right-panel"></aside>
      </div>
    </div><!-- /overviewContent -->
    <div id="analyticsContent" style="display:none;flex:1;overflow-y:auto;min-height:0;padding:0 24px 24px"></div>
  </main>
</div>

<!-- BOTTOM NAV (mobile) -->
<nav class="bottom-nav">
  <button class="bnav-item active" onclick="bnavClick(this,'')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    <span>Home</span>
  </button>
  <button class="bnav-item" onclick="bnavClick(this,'open')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    <span>Open</span>
  </button>
  <button class="bnav-item" onclick="bnavClick(this,'in_progress')">
    <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/><circle cx="12" cy="12" r="4"/></svg>
    <span>Progress</span>
  </button>
  <button class="bnav-item" onclick="bnavClick(this,'pending')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M10 9h4M10 15h4"/></svg>
    <span>Pending</span>
  </button>
  <button class="bnav-item" onclick="bnavClick(this,'closed')">
    <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span>Closed</span>
  </button>
</nav>

<!-- DETAIL DRAWER -->
<div id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-drawer" id="detailDrawer">
    <header class="drawer-header">
      <div class="drawer-header-left">
        <svg viewBox="0 0 24 24" class="drawer-header-ico"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span class="drawer-title">Ticket Detail</span>
      </div>
      <button class="drawer-close" onclick="document.getElementById('detail-overlay').classList.remove('show');state.selectedId=null;renderList()" aria-label="Close">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </header>
    <div id="drawerBody" class="drawer-body"></div>
  </div>
</div>

<script src="assets/js/app.js" defer></script>
</body>
</html>
